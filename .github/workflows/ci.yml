name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -e '.[dev]'
      - id: ruff
        continue-on-error: true
        run: ruff check . --output-format=json > ruff-report.json
      - if: steps.ruff.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: ruff-report
          path: ruff-report.json
      - if: steps.ruff.outcome == 'failure'
        run: |
          cat ruff-report.json
          exit 1
      - id: unit_tests
        continue-on-error: true
        run: pytest --ignore=tests/e2e --junitxml=unit-results.xml
      - if: steps.unit_tests.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-results
          path: unit-results.xml
      - if: steps.unit_tests.outcome == 'failure'
        run: exit 1

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -e '.[dev]'
      - run: python -m playwright install --with-deps chromium
      - id: e2e_tests
        continue-on-error: true
        run: pytest tests/e2e --junitxml=e2e-results.xml
      - if: steps.e2e_tests.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: e2e-test-results
          path: e2e-results.xml
      - if: steps.e2e_tests.outcome == 'failure'
        run: exit 1
